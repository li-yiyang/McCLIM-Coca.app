# Credits:
# This CI workflow is modified from
# https://github.com/lem-project/lem
# .github/workflows/nightly-builds.yml
#
# I removed the other platform and focus only macOS platform.
name: Nightly Builds

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Build even if no new commits'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  mac:
    name: Nightly Build (macOS)
    runs-on: macos-latest
    outputs:
      built: ${{ steps.flag.outputs.built }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Fetch McCLIM-Coca
        run: |
          mkdir -p ~/common-lisp/
          git clone https://codeberg.org/li-yiyang/McCLIM.git ~/common-lisp/McCLIM
          # trivial patch, why cannot load? 
          git clone https://github.com/xach/zpb-ttf.git       ~/common-lisp/zpb-ttf

      - name: Check changes since last nightly
        id: diff
        run: |
          cd $HOME/common-lisp/McCLIM
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.force_build }}" == "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            COMMIT_COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
            if [ "$COMMIT_COUNT" -gt 0 ]; then
              echo "skip=false" >> $GITHUB_OUTPUT
            else
              echo "skip=true"  >> $GITHUB_OUTPUT
            fi
          fi

      - name: No changes — skip build
        if: steps.diff.outputs.skip == 'true'
        run: echo "No changes since last nightly. Skipping."

      - name: Set up Common Lisp environment
        if: steps.diff.outputs.skip != 'true'
        run: |
          brew install sbcl
          curl -O https://beta.quicklisp.org/quicklisp.lisp
          sbcl --non-interactive \
               --load quicklisp.lisp \
               --eval "(quicklisp-quickstart:install)"

      - name: Build McCLIM-Coca.app
        if: steps.diff.outputs.skip != 'true'
        run: |
          sbcl --non-interactive \
               --load "$HOME/quicklisp/setup.lisp" \
               --eval "(ql:quickload :mcclim-coca)" \
               --eval "(asdf:make :mcclim-coca/app)"

          cd $HOME/common-lisp/McCLIM/Backends/coca/bin/
          tar czvf McCLIM.app.tar.gz McCLIM.app

      - name: Upload artifact (macOS)
        if: steps.diff.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-${{ github.run_id }}
          name: McCLIM-Coca/App Nightly Build
          prerelease: true
          files: $HOME/common-lisp/McCLIM/Backends/coca/bin/McCLIM.app.tar.gz
          body: |
            Automated nightly build McCLIM-Coca.app
            Last updated ${{ github.event.head_commit.timestamp || 'Manual Trigger' }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}